services:
  postgres:
    image: postgres:16-alpine
    container_name: ratelimiter-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d ratelimiter_db"]
      interval: 3s
      timeout: 3s
      retries: 3
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ratelimiter-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
        test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
        interval: 5s
        timeout: 5s
        retries: 5
  redis:
    image: redis:7.2-alpine
    container_name: ratelimiter-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
  rate-limiter:
    build: .
    mem_limit: 512m
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy



volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:

networks:
  default:
    name: ratelimiter-net